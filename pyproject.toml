[tool.ruff]
line-length = 120
target-version = "py313"
extend-exclude = [
  ".agents",
  "marketing/migrations",
  "tools",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["tests", "marketing"]
