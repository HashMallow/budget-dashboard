{% load marketing_format %}
{% if page_obj.has_other_pages %}
  <div class="pagination">
    {% if page_obj.has_previous %}
      <a class="btn" href="?{% qs page=page_obj.previous_page_number %}">{% t "Previous" %}</a>
    {% endif %}
    <span class="btn">{% t "Page" %} {{ page_obj.number }} {% t "of" %} {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a class="btn" href="?{% qs page=page_obj.next_page_number %}">{% t "Next" %}</a>
    {% endif %}
  </div>
{% endif %}
